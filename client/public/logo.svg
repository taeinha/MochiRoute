<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 96" fill="none" role="img" aria-label="MochiRoute logo">
  <title>MochiRoute</title>
  <style>
    .word-mochi { fill: #D97028; }
    .word-route { fill: #F09040; }
    @media (prefers-color-scheme: dark) {
      .word-mochi { fill: #FFBC7A; }
      .word-route { fill: #FFD9A8; }
    }
  </style>

  <!-- Running cat (left → right) -->
  <g transform="translate(4, 10)">
    <!-- Tail -->
    <path d="M8 34 Q-2 18 6 6 Q12 -2 18 4" stroke="#D97028" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Back leg -->
    <ellipse cx="22" cy="58" rx="5" ry="9" fill="#D97028" transform="rotate(-25 22 58)"/>
    <!-- Front leg -->
    <ellipse cx="62" cy="56" rx="5" ry="8" fill="#D97028" transform="rotate(35 62 56)"/>

    <!-- Body -->
    <ellipse cx="38" cy="42" rx="30" ry="18" fill="#F09040" transform="rotate(-8 38 42)"/>

    <!-- White belly -->
    <ellipse cx="40" cy="46" rx="18" ry="10" fill="#FFF5EB" transform="rotate(-8 40 46)"/>

    <!-- Back stripe -->
    <path d="M16 36 Q30 30 48 34" stroke="#D97028" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Head -->
    <circle cx="68" cy="32" r="16" fill="#F09040"/>

    <!-- White muzzle -->
    <ellipse cx="78" cy="36" rx="9" ry="7" fill="#FFF5EB"/>

    <!-- Ear -->
    <path d="M58 20 L54 8 L66 18 Z" fill="#D97028"/>
    <path d="M72 18 L76 6 L80 16 Z" fill="#D97028"/>

    <!-- Goofy eye -->
    <circle cx="74" cy="28" r="5.5" fill="#FFF5EB"/>
    <circle cx="76" cy="28" r="3" fill="#8B5A3C"/>
    <circle cx="77" cy="27" r="1" fill="#FFF5EB"/>

    <!-- Nose -->
    <ellipse cx="82" cy="35" rx="2.5" ry="2" fill="#8B5A3C"/>

    <!-- Tongue -->
    <ellipse cx="80" cy="40" rx="2" ry="3" fill="#FF8FA8"/>

    <!-- Front paw -->
    <ellipse cx="76" cy="54" rx="5" ry="7" fill="#F09040" transform="rotate(20 76 54)"/>
  </g>

  <!-- Wordmark -->
  <text x="118" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5">
    <tspan class="word-mochi">Mochi</tspan><tspan class="word-route">Route</tspan>
  </text>
</svg>
