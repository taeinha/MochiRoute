<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" fill="none" role="img" aria-label="MochiRoute icon">
  <title>MochiRoute</title>

  <!-- Running cat (left → right) -->
  <g transform="translate(6, 6)">
    <!-- Tail -->
    <path d="M6 28 Q-2 14 4 4 Q10 -2 14 2" stroke="#D97028" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Back leg -->
    <ellipse cx="18" cy="48" rx="4" ry="7" fill="#D97028" transform="rotate(-25 18 48)"/>
    <!-- Front leg -->
    <ellipse cx="50" cy="46" rx="4" ry="6" fill="#D97028" transform="rotate(35 50 46)"/>

    <!-- Body -->
    <ellipse cx="32" cy="34" rx="24" ry="14" fill="#F09040" transform="rotate(-8 32 34)"/>

    <!-- White belly -->
    <ellipse cx="34" cy="38" rx="14" ry="8" fill="#FFF5EB" transform="rotate(-8 34 38)"/>

    <!-- Back stripe -->
    <path d="M12 28 Q24 24 40 28" stroke="#D97028" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Head -->
    <circle cx="56" cy="26" r="13" fill="#F09040"/>

    <!-- White muzzle -->
    <ellipse cx="64" cy="30" rx="7" ry="6" fill="#FFF5EB"/>

    <!-- Ears -->
    <path d="M46 16 L43 6 L54 15 Z" fill="#D97028"/>
    <path d="M58 14 L61 4 L66 13 Z" fill="#D97028"/>

    <!-- Goofy eye -->
    <circle cx="60" cy="23" r="4.5" fill="#FFF5EB"/>
    <circle cx="61.5" cy="23" r="2.5" fill="#8B5A3C"/>
    <circle cx="62" cy="22.5" r="0.8" fill="#FFF5EB"/>

    <!-- Nose -->
    <ellipse cx="66" cy="29" rx="2" ry="1.5" fill="#8B5A3C"/>

    <!-- Tongue -->
    <ellipse cx="64" cy="33" rx="1.5" ry="2.5" fill="#FF8FA8"/>

    <!-- Front paw -->
    <ellipse cx="62" cy="44" rx="4" ry="6" fill="#F09040" transform="rotate(20 62 44)"/>
  </g>
</svg>
