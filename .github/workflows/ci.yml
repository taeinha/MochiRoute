name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build -w shared

      - name: Typecheck server
        run: npm exec -w server -- tsc --noEmit

      - name: Test server
        run: npm run test -w server

      - name: Build client
        run: npm run build -w client

      - name: Lint client
        run: npm run lint -w client
